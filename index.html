<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated C Patterns Demo</title>
<style>
body {
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 50px 20px;
}

.container {
    background: rgba(0,0,0,0.85);
    padding: 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
}

h1 {
    text-align: center;
    color: #00ffd5;
    font-size: 2.5rem;
    margin-bottom: 30px;
}

.output-box {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    font-size: 1rem;
    line-height: 1.6;
    white-space: pre;
}

.output-line {
    opacity: 0;
    animation: lineAppear 0.5s forwards;
}

@keyframes lineAppear {
    from {opacity: 0; transform: translateX(-20px);}
    to {opacity: 1; transform: translateX(0);}
}
</style>
</head>
<body>
<div class="container">
    <h1>Triangle & Pyramid Patterns</h1>
    <div class="output-box" id="patterns"></div>
</div>

<script>
const patternsDiv = document.getElementById('patterns');
let delay = 0.2; // animation delay in seconds
const n = 5; // number of rows

function addLine(text) {
    const div = document.createElement('div');
    div.className = 'output-line';
    div.style.animationDelay = `${delay}s`;
    div.textContent = text;
    patternsDiv.appendChild(div);
    delay += 0.2;
}

// Right Triangle (Filled)
addLine('Right Triangle (Filled):');
for(let i=1;i<=n;i++){
    addLine('*'.repeat(i));
}

// Right Triangle (Hollow)
addLine('Right Triangle (Hollow):');
for(let i=1;i<=n;i++){
    let line = '';
    for(let j=1;j<=i;j++){
        if(j==1||j==i||i==n) line+='*';
        else line+=' ';
    }
    addLine(line);
}

// Left Triangle (Filled)
addLine('Left Triangle (Filled):');
for(let i=1;i<=n;i++){
    addLine(' '.repeat(n-i)+ '*'.repeat(i));
}

// Left Triangle (Hollow)
addLine('Left Triangle (Hollow):');
for(let i=1;i<=n;i++){
    let line = ' '.repeat(n-i);
    for(let j=1;j<=i;j++){
        if(j==1||j==i||i==n) line+='*';
        else line+=' ';
    }
    addLine(line);
}

// Full Pyramid (Filled)
addLine('Full Pyramid (Filled):');
for(let i=1;i<=n;i++){
    addLine(' '.repeat(n-i) + '*'.repeat(2*i-1));
}

// Full Pyramid (Hollow)
addLine('Full Pyramid (Hollow):');
for(let i=1;i<=n;i++){
    let line = ' '.repeat(n-i);
    for(let j=1;j<=2*i-1;j++){
        if(j==1||j==(2*i-1)||i==n) line+='*';
        else line+=' ';
    }
    addLine(line);
}

// Diamond Pattern
addLine('Diamond Pattern:');
// Top Half
for(let i=1;i<=n;i++){
    addLine(' '.repeat(n-i) + '*'.repeat(2*i-1));
}
// Bottom Half
for(let i=n-1;i>=1;i--){
    addLine(' '.repeat(n-i) + '*'.repeat(2*i-1));
}
</script>
</body>
</html>
